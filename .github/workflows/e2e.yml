# Suite Playwright E2E — se activa solo cuando cambia código relevante.
# Separado de ci.yml para no bloquear PRs de docs/infra con la espera de Moodle.
name: E2E

on:
  push:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'plugins/**'
      - 'scripts/seed.sh'
      - 'compose.yml'
      - '.env.example'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'e2e/**'
      - 'plugins/**'
      - 'scripts/seed.sh'
      - 'compose.yml'
      - '.env.example'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch: # disparo manual para la demo en vivo

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # necesario para el reporter github nativo de Playwright

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — stack + seed + Playwright (un solo job: evita el doble arranque de Moodle)
  # ─────────────────────────────────────────────────────────────────────────────
  playwright:
    name: Suite Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25 # Moodle up (~7 min) + seed (~2 min) + tests (~10 min) + margen

    steps:
      - uses: actions/checkout@v7

      # ── Toolchain Node/pnpm ─────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: 11 # coincide con packageManager en package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22 # pnpm@11.9 requiere Node >= 22.13
          cache: pnpm # caché del store de pnpm entre corridas

      - name: Instalar dependencias npm
        run: pnpm install --frozen-lockfile

      # ── Caché de browsers de Playwright ─────────────────────────────────────
      # Key basada en lockfile: solo se invalida cuando cambian las deps de Playwright.
      - name: Restaurar caché de browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Instalar browsers Playwright
        # Usa el binario del paquete instalado (no pnpm dlx) — versión garantizada igual al lockfile.
        # Solo instala si la caché no era exacta (restore-keys puede traer una parcial).
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            # Instalar solo las system-deps que el runner pueda no tener aunque el cache sea hit.
            npx playwright install-deps chromium
          fi

      # ── Stack de Moodle ──────────────────────────────────────────────────────
      - name: Levantar stack (compose up)
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Esperar Moodle healthy (máx 8 min)
        run: |
          cid=$(docker compose ps -q moodle)
          for i in $(seq 1 96); do
            status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "missing")
            [ "$status" = "healthy" ] && echo "✓ Moodle healthy (intento $i)" && exit 0
            state=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "")
            case "$state" in restarting|exited|dead) break ;; esac
            sleep 5
          done
          echo "::error::Moodle no llegó a healthy — abortando"
          docker compose logs --tail=150 moodle
          exit 1

      - name: Seeding del entorno (idempotente)
        run: bash scripts/seed.sh

      # ── Playwright ───────────────────────────────────────────────────────────
      - name: Correr suite completa
        # pnpm test:ci lleva -c e2e --reporter=html,github (definido en package.json).
        # El proyecto "setup" corre primero (auth), luego "core" (paralelo) y "timed" (serial).
        run: pnpm test:ci
        env:
          SITE_URL: http://localhost:8080

      # ── Evidencia de corrida ─────────────────────────────────────────────────
      - name: Publicar reporte HTML + traces + videos
        if: always() # siempre, incluso si los tests fallan — es evidencia de fallo
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Recolectar logs de compose (siempre)
        if: always()
        run: docker compose logs > compose-logs-e2e.txt 2>&1

      - name: Publicar logs de compose
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs-e2e-${{ github.run_number }}
          path: compose-logs-e2e.txt
          retention-days: 7
