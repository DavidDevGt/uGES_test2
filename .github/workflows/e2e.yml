# CI del proyecto (SPECS.md §4.4).
# Etapas hoy: análisis estático → smoke del entorno (compose up + seed x2 + asserts).
# La etapa e2e (Playwright) se activa sola cuando exista e2e/ — ver job "e2e" abajo.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # disparo manual para la demo en vivo

jobs:
  static:
    name: Análisis estático
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks necesita el historial

      - name: ShellCheck (scripts bash)
        # SC1091 (source .env no seguido) es info esperado; warnings+ sí rompen.
        run: shellcheck --severity=warning scripts/*.sh

      - name: Lint PHP (scripts CLI de Moodle)
        run: docker run --rm -v "$PWD/scripts:/s:ro" php:8.3-cli-alpine sh -c 'for f in /s/*.php; do php -l "$f"; done'

      - name: Validar compose.yml
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Gitleaks (secretos commiteados)
        run: docker run --rm -v "$PWD:/repo:ro" zricethezav/gitleaks:latest detect --source /repo --no-banner

  env-smoke:
    name: Entorno + seeding (smoke)
    runs-on: ubuntu-latest
    needs: static
    outputs:
      has_e2e: ${{ steps.detect.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v4

      - name: Detectar si la suite e2e ya existe
        id: detect
        run: |
          if compgen -G "e2e/**/*.ts" > /dev/null || ls e2e/*.ts >/dev/null 2>&1; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Levantar stack
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Esperar Moodle healthy
        run: |
          cid=$(docker compose ps -q moodle)
          for _ in $(seq 1 80); do
            h=$(docker inspect -f '{{.State.Health.Status}}' "$cid")
            [ "$h" = "healthy" ] && exit 0
            s=$(docker inspect -f '{{.State.Status}}' "$cid")
            case "$s" in restarting|exited) break ;; esac
            sleep 5
          done
          echo "::error::Moodle no llegó a healthy"
          docker compose logs moodle
          exit 1

      - name: Info de imágenes (tamaño y digest, para el registro de la corrida)
        run: docker images --format '{{.Repository}}:{{.Tag}}  {{.Size}}  {{.Digest}}' | sort

      - name: Verificación del entorno (seed idempotente + asserts + logins)
        run: bash scripts/verify-env.sh

      - name: Recolectar logs
        if: always()
        run: docker compose logs > compose-logs.txt 2>&1

      - name: Publicar logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7

  e2e:
    name: Suite Playwright
    runs-on: ubuntu-latest
    needs: env-smoke
    # Se activa automáticamente cuando la suite exista en el repo.
    if: ${{ needs.env-smoke.outputs.has_e2e == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm # caché del store de pnpm entre corridas

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Caché de browsers de Playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar browsers
        run: pnpm dlx playwright install --with-deps chromium

      - name: Levantar stack + seed
        run: |
          cp .env.example .env
          docker compose up -d --wait
          bash scripts/seed.sh

      - name: Correr suite
        run: pnpm test

      - name: Publicar reporte HTML + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
